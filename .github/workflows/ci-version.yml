name: CI for versioning

on:
  pull_request:
    branches: [ "main" ]
    types: [ closed ]

jobs:
  bump-patch:
    if: ${{ github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'bump:patch') }}
    secrets: inherit
    uses: SBouchard01/test_ci/.github/workflows/bump-version.yml@main
    permissions:
      pull-requests: read
      contents: write
    with:
      bump_type: patch
  bump-minor:
    if: ${{ github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'bump:minor') }}
    secrets: inherit
    uses: SBouchard01/test_ci/.github/workflows/bump-version.yml@main
    permissions:
      pull-requests: read
      contents: write
    with:
      bump_type: minor
  bump-major:
    if: ${{ github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'bump:major') }}
    secrets: inherit
    uses: SBouchard01/test_ci/.github/workflows/bump-version.yml@main
    permissions:
      pull-requests: read
      contents: write
    with:
      bump_type: major

  merge-dev:
    needs: [bump-patch, bump-minor, bump-major]
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge dev into main
        run: |
          git checkout main
          git merge dev --no-ff -m "Merge dev into main after version bump"
          git push origin main